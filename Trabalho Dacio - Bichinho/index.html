<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Pet Virtual</title>

    
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-image: url("img/campo.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center">

    <div class="bg-white/10 backdrop-blur-xl p-6 rounded-3xl shadow-2xl text-center w-[350px]">

        <h1 class="text-2xl text-white font-bold mb-4">🐾 Meu Pet Virtual</h1>

        <img id="pet" src="img/normalbg.png" 
             class="w-52 mx-auto mb-4 transition-all duration-500"/>

       
        <div class="mb-4">
            <p class="text-white text-sm mb-1">Vida</p>
            <div class="w-full bg-gray-700 rounded-full h-3">
                <div id="vida" class="bg-green-400 h-3 rounded-full w-full"></div>
            </div>
        </div>

        
        <button onclick="alimentar()" 
            class="bg-yellow-400 hover:bg-yellow-500 text-black font-bold py-2 px-4 rounded-xl transition">
            🍗 Alimentar
        </button>

        <div class="fixed bottom-4 right-4">
    <img src="img/usuario.png" 
         onclick="acaoUsuario()" 
         class="w-16 h-16 rounded-full shadow-lg cursor-pointer hover:scale-110 transition"/>
</div>

    </div>

<script>
const pet = document.getElementById("pet");
const vidaBar = document.getElementById("vida");

const estados = {
    normal: "img/normalbg.png",
    puto: "img/bravobg.png",
    morto: "img/morto-removebg-preview.png",
    comendo: "img/tomabg.png",
    alimentado: "img/felizbg.png",
};

let vida = 100;
let contador = 0;


function atualizarVida() {
    vidaBar.style.width = vida + "%";

    if (vida > 60) {
        vidaBar.className = "bg-green-400 h-3 rounded-full";
    } else if (vida > 30) {
        vidaBar.className = "bg-yellow-400 h-3 rounded-full";
    } else {
        vidaBar.className = "bg-red-500 h-3 rounded-full";
    }
}


function controlador() {
    setInterval(() => {
        contador++;
        vida -= 5;

        if (vida <= 0) {
            vida = 0;
            pet.src = estados.morto;
            atualizarVida();
            return;
        }

        if (contador >= 6) {
            pet.src = estados.puto;
        } else {
            pet.src = estados.normal;
        }

        atualizarVida();
    }, 2000);
}


function alimentar() {
    if (vida <= 0) return;

    pet.src = estados.comendo;
    vida += 20;

    if (vida > 100) vida = 100;

    setTimeout(() => {
        pet.src = estados.alimentado;
    }, 800);

    setTimeout(() => {
        pet.src = estados.normal;
    }, 1500);

    contador = 0;
    atualizarVida();
}

atualizarVida();
controlador();

function acaoUsuario() {
    alert("Você clicou no botão especial 😎");
}
</script>

</body>
</html>
